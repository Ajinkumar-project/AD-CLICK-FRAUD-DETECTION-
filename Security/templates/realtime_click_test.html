<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Realtime Click Console</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>.sidebar{min-height:100vh}.nav-pills .nav-link.active{background:#0d6efd}</style>
  </head>
  <body class="bg-light">
    <div class="container-fluid"><div class="row">
      <aside class="col-12 col-md-3 col-lg-2 bg-white border-end sidebar p-3">
        <h5 class="fw-bold mb-3">Adclick Security</h5>
        <nav class="nav nav-pills flex-column gap-1">
          <a class="nav-link" href="{% url 'home' %}">Home</a>
              <a class="nav-link" href="{% url 'predict_link' %}">Predict</a>
    <a class="nav-link active" href="{% url 'realtime_click' %}">Real Time</a>
    
    <a class="nav-link " href="{% url 'complaint_register' %}">Complaint Register</a>
  <a class="nav-link" href="{% url 'complaint_list' %}">View Complaints</a></nav>
        </nav>
<div class="mt-4 pt-3 border-top sidebar-user">
  <div class="d-flex align-items-center gap-2 mb-2">
    <span style="font-size: 1.25rem;">&#128100;</span>
    <span class="small fw-semibold">{{ request.user.username|default:"Guest" }}</span>
  </div>
  <a class="btn btn-outline-danger btn-sm w-100" href="{% url 'logout' %}">Logout</a>
</div>
</aside>
      <main class="col-12 col-md-9 col-lg-10 p-4">
      <div class="d-flex align-items-center justify-content-between mb-3"><div><h1 class="h3 mb-1">Realtime Click Console</h1><p class="text-muted mb-0">Live POST to <code>/realtime_click/</code> and inspect model output.</p></div><span class="badge text-bg-info">Live Detection</span></div>
      <div class="row g-3"><div class="col-lg-6"><div class="card shadow-sm"><div class="card-body">
      <label class="form-label">Click Count</label><input id="click_count" type="number" class="form-control" value="1" />
      <label class="form-label mt-3">Click Interval (seconds)</label><input id="click_interval" type="number" step="0.01" class="form-control" value="0.5" />
      <label class="form-label mt-3">Referrer</label><input id="referrer" type="text" class="form-control" value="none" />
      <label class="form-label mt-3">Label (optional: 0 or 1)</label><input id="label" type="number" min="0" max="1" class="form-control" />
      <button id="sendBtn" class="btn btn-primary mt-3 w-100">Send to Model</button></div></div></div>
      <div class="col-lg-6"><div class="card shadow-sm"><div class="card-body"><div class="row g-2"><div class="col-sm-6"><div class="border rounded p-2 bg-light"><small class="text-muted d-block">Prediction</small><strong id="predOut">-</strong></div></div><div class="col-sm-6"><div class="border rounded p-2 bg-light"><small class="text-muted d-block">Fraud Probability</small><strong id="probOut">-</strong></div></div></div><pre id="out" class="bg-light border rounded p-3 mt-3 mb-0" style="min-height:180px;">{}</pre></div></div></div></div>
      </main></div></div>
    <script>
      const out = document.getElementById('out');
      const predOut = document.getElementById('predOut');
      const probOut = document.getElementById('probOut');
      document.getElementById('sendBtn').addEventListener('click', async () => {
        const payload = {client:{click_count:Number(document.getElementById('click_count').value||1),click_interval:Number(document.getElementById('click_interval').value||0.5),user_agent:navigator.userAgent},server:{referrer:document.getElementById('referrer').value||'none'}};
        const labelVal = document.getElementById('label').value; if (labelVal !== '') payload.label = Number(labelVal);
        const res = await fetch('/realtime_click/', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
        const data = await res.json(); out.textContent = JSON.stringify(data, null, 2); predOut.textContent = data.prediction || '-'; probOut.textContent = (data.probability !== null && data.probability !== undefined) ? data.probability + '%' : '-';
      });
    </script>
  </body>
</html>
